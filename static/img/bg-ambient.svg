<svg viewBox="0 0 1600 900" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgSky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a0f1a"/>
      <stop offset="55%" stop-color="#0c1422"/>
      <stop offset="100%" stop-color="#0e1a2c"/>
    </linearGradient>
    <radialGradient id="glowTeal" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#2dd4bf" stop-opacity="0.16"/>
      <stop offset="100%" stop-color="#2dd4bf" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowBlue" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#5ec8ff" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#5ec8ff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="waterFar" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2dd4bf" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#0f766e" stop-opacity="0.1"/>
    </linearGradient>
  </defs>

  <rect width="1600" height="900" fill="url(#bgSky)"/>
  <circle cx="220" cy="120" r="420" fill="url(#glowTeal)"/>
  <circle cx="1420" cy="60" r="480" fill="url(#glowBlue)"/>
  <circle cx="1300" cy="820" r="360" fill="url(#glowTeal)"/>

  <!-- extremely faint city silhouette line, far background -->
  <g opacity="0.35" fill="#101c2e">
    <rect x="60"   y="760" width="46" height="140"/>
    <rect x="112"  y="700" width="34" height="200"/>
    <rect x="152"  y="790" width="40" height="110"/>
    <rect x="198"  y="730" width="30" height="170"/>
    <rect x="960"  y="770" width="42" height="130"/>
    <rect x="1010" y="720" width="30" height="180"/>
    <rect x="1050" y="800" width="46" height="100"/>
    <rect x="1104" y="740" width="26" height="160"/>
    <rect x="1300" y="780" width="50" height="120"/>
    <rect x="1360" y="730" width="32" height="170"/>
  </g>

  <!-- faint rain streaks -->
  <g stroke="#5ec8ff" stroke-width="1.5" stroke-linecap="round" opacity="0.08">
    <line x1="300" y1="80" x2="280" y2="160"/>
    <line x1="340" y1="60" x2="320" y2="140"/>
    <line x1="700" y1="100" x2="680" y2="180"/>
    <line x1="1150" y1="90" x2="1130" y2="170"/>
    <line x1="1190" y1="120" x2="1170" y2="200"/>
  </g>

  <!-- very subtle rising water band along the bottom -->
  <path d="M0 840 Q100 828 200 840 T400 840 T600 840 T800 840 T1000 840 T1200 840 T1400 840 T1600 840 V900 H0 Z" fill="url(#waterFar)"/>
</svg>