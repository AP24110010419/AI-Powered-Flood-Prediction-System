<svg viewBox="0 0 520 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a1120"/>
      <stop offset="100%" stop-color="#131f33"/>
    </linearGradient>
    <linearGradient id="water" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2dd4bf" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#0f766e" stop-opacity="0.9"/>
    </linearGradient>
    <linearGradient id="waterTop" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#5eead4" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#2dd4bf" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="moon" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#eaf2f8"/>
      <stop offset="100%" stop-color="#8fa3b8"/>
    </radialGradient>
  </defs>

  <rect width="520" height="400" fill="url(#sky)"/>

  <circle cx="430" cy="70" r="34" fill="url(#moon)" opacity="0.9"/>
  <circle cx="430" cy="70" r="34" fill="#0a1120" opacity="0.12"/>

  <!-- soft clouds -->
  <g opacity="0.5" fill="#233047">
    <ellipse cx="120" cy="70" rx="70" ry="22"/>
    <ellipse cx="170" cy="60" rx="50" ry="18"/>
    <ellipse cx="320" cy="100" rx="90" ry="24"/>
    <ellipse cx="270" cy="90" rx="55" ry="18"/>
  </g>

  <!-- rain -->
  <g stroke="#5ec8ff" stroke-width="2" stroke-linecap="round" opacity="0.45">
    <line x1="90" y1="110" x2="78" y2="150"/>
    <line x1="115" y1="120" x2="103" y2="160"/>
    <line x1="140" y1="105" x2="128" y2="145"/>
    <line x1="255" y1="130" x2="243" y2="170"/>
    <line x1="285" y1="120" x2="273" y2="160"/>
    <line x1="310" y1="140" x2="298" y2="180"/>
    <line x1="200" y1="115" x2="188" y2="155"/>
  </g>

  <!-- city skyline (submerged) -->
  <g>
    <rect x="40"  y="190" width="34" height="150" fill="#1b2740"/>
    <rect x="80"  y="150" width="26" height="190" fill="#233047"/>
    <rect x="112" y="210" width="30" height="130" fill="#1b2740"/>
    <rect x="148" y="170" width="22" height="170" fill="#233047"/>
    <rect x="176" y="230" width="40" height="110" fill="#1b2740"/>
    <rect x="222" y="185" width="28" height="155" fill="#233047"/>
    <rect x="256" y="205" width="24" height="135" fill="#1b2740"/>
    <rect x="286" y="160" width="30" height="180" fill="#233047"/>
    <rect x="322" y="220" width="36" height="120" fill="#1b2740"/>
    <rect x="364" y="195" width="26" height="145" fill="#233047"/>

    <!-- lit windows -->
    <g fill="#f2b134" opacity="0.85">
      <rect x="48" y="205" width="5" height="7"/>
      <rect x="60" y="225" width="5" height="7"/>
      <rect x="88" y="170" width="5" height="7"/>
      <rect x="88" y="195" width="5" height="7"/>
      <rect x="120" y="230" width="5" height="7"/>
      <rect x="184" y="250" width="5" height="7"/>
      <rect x="230" y="205" width="5" height="7"/>
      <rect x="294" y="185" width="5" height="7"/>
      <rect x="330" y="245" width="5" height="7"/>
      <rect x="372" y="215" width="5" height="7"/>
    </g>
  </g>

  <!-- rising floodwater -->
  <path d="M0 268 Q40 258 80 268 T160 268 T240 268 T320 268 T400 268 T520 268 V400 H0 Z" fill="url(#waterTop)"/>
  <path d="M0 285 Q40 275 80 285 T160 285 T240 285 T320 285 T400 285 T520 285 V400 H0 Z" fill="url(#water)"/>

  <!-- reflection shimmer -->
  <g stroke="#5eead4" stroke-width="1.5" opacity="0.3">
    <line x1="60" y1="310" x2="110" y2="310"/>
    <line x1="150" y1="325" x2="210" y2="325"/>
    <line x1="260" y1="315" x2="300" y2="315"/>
    <line x1="340" y1="330" x2="400" y2="330"/>
  </g>
</svg>